<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTT Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <h2>💰 UTT Tracker Pro</h2>
        <div class="input-group">
            <label>Mtaji (TSh):</label>
            <input type="number" id="capital" placeholder="Weka kiasi...">
        </div>
        <div class="input-group">
            <label>Riba ya Mwaka (%):</label>
            <input type="number" id="rate" value="12">
        </div>
        <button onclick="calculate()">Piga Hesabu ya Kitajiri</button>
        <div id="result" class="result-box">Baada ya miaka 10: TSh 0.00</div>
    </div>

    <div class="chart-container" style="display: flex; align-items: flex-end; height: 100px; gap: 5px;">
        <div style="height: 20%; width: 20px; background: var(--gold);"></div>
        <div style="height: 45%; width: 20px; background: var(--gold);"></div>
        <div style="height: 70%; width: 20px; background: var(--gold);"></div>
        <div style="height: 100%; width: 20px; background: var(--gold);"></div>
    </div>

<div class="counter-container">
    <p>👁️ Wageni Waliotembelea: <span id="count">Inapakia...</span></p>
</div>

<style>
  .counter-container {
    text-align: center;
    padding: 10px;
    color: #d4af37; 
    font-size: 0.9rem;
    border-top: 1px solid #333;
  }
</style>



    <script src="script.js"></script>
</body>


</html>
